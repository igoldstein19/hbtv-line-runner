<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBTV Line Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- TOOLBAR ---- */
    header {
      background: #16213e;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 2px solid #0f3460;
      flex-wrap: wrap;
    }

    header h1 { font-size: 1.2rem; color: #e94560; white-space: nowrap; }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar-label {
      color: #888;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .toolbar-group button, .toolbar-group select {
      padding: 5px 12px;
      border: 1px solid #333;
      background: #16213e;
      color: #a8a8b8;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
    }

    .toolbar-group button.active {
      background: #e94560;
      color: white;
      border-color: #e94560;
    }

    /* Character buttons */
    #char-selector button.active[data-char="andy"] { background: #8B6914; border-color: #ffd700; color: #ffd700; }
    #char-selector button.active[data-char="mia"] { background: #6b1a3a; border-color: #ff6b9d; color: #ff6b9d; }
    #char-selector button.active[data-char="sam"] { background: #1a4a3e; border-color: #4ecca3; color: #4ecca3; }
    #char-selector button.active[data-char="leo"] { background: #1a3a5e; border-color: #45b7d1; color: #45b7d1; }

    #char-other-select {
      background: #16213e;
      color: #a8a8b8;
      max-width: 160px;
    }

    #char-other-select.active {
      background: #3a2a1a;
      border-color: #ff8c42;
      color: #ff8c42;
    }

    #scene-select {
      background: #16213e;
      color: #a8a8b8;
      max-width: 260px;
    }

    .spacer { flex: 1; }

    #scene-indicator {
      font-size: 0.85rem;
      color: #a8a8b8;
      white-space: nowrap;
    }

    /* ---- MAIN ---- */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 16px;
    }

    #history {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 12px;
      padding: 16px;
      background: #16213e;
      border-radius: 8px;
      min-height: 300px;
      max-height: calc(100vh - 300px);
    }

    .line-entry {
      margin-bottom: 14px;
      padding: 10px 14px;
      border-radius: 6px;
      transition: opacity 0.3s;
    }

    .line-entry.spoken { opacity: 0.5; }
    .line-entry.current { opacity: 1; background: #1a1a3e; border-left: 3px solid #e94560; }
    .line-entry.upcoming { opacity: 0.3; }

    .character-name {
      font-weight: bold;
      font-size: 0.85rem;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .dialogue-text {
      font-size: 1.1rem;
      line-height: 1.5;
    }

    /* My-line styling */
    .line-entry.my-line { background: #2a1a3e; border-left: 3px solid #ffd700; }
    .line-entry.my-line .character-name { color: #ffd700; }

    /* Hidden line (for memorization) */
    .dialogue-hidden {
      font-size: 1.1rem;
      line-height: 1.5;
      color: #555;
      font-style: italic;
      cursor: pointer;
      user-select: none;
    }

    .dialogue-hidden:hover { color: #777; }

    .btn-reveal {
      display: inline-block;
      padding: 3px 10px;
      margin-left: 8px;
      background: #333;
      color: #999;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: inherit;
      vertical-align: middle;
    }

    .btn-reveal:hover { background: #444; color: #ccc; }

    .scene-header {
      text-align: center;
      padding: 16px;
      margin: 20px 0;
      color: #e94560;
      font-size: 1.2rem;
      font-weight: bold;
      border-top: 1px solid #333;
      border-bottom: 1px solid #333;
    }

    .song-marker {
      text-align: center;
      padding: 10px;
      margin: 12px 0;
      color: #a8a8b8;
      font-style: italic;
      font-size: 0.9rem;
    }

    /* ---- CONTROLS ---- */
    #controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      background: #16213e;
      border-radius: 8px;
    }

    #status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    #status-text { font-size: 1rem; color: #a8a8b8; flex: 1; }
    #status-text.your-line { color: #ffd700; font-weight: bold; font-size: 1.1rem; }
    #status-text.speaking { color: #4ecca3; }

    .btn-row { display: flex; gap: 8px; }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      font-family: inherit;
      transition: background 0.2s;
    }

    #btn-start { background: #4ecca3; color: #1a1a2e; font-weight: bold; flex: 1; }
    #btn-start:hover { background: #3db890; }

    #btn-done { background: #ffd700; color: #1a1a2e; font-weight: bold; flex: 1; font-size: 1.1rem; display: none; }
    #btn-done:hover { background: #e6c200; }

    #btn-stop { background: #e94560; color: white; }
    #btn-stop:hover { background: #d13a52; }
    #btn-stop:disabled { background: #555; color: #888; cursor: default; }

    #btn-pause { background: #555; color: white; }
    #btn-pause:hover { background: #666; }

    #btn-skip { background: #444; color: #aaa; }
    #btn-skip:hover { background: #555; }

    #speed-control {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: #888;
    }

    #speed-control input { width: 120px; }

    #voice-loading { text-align: center; padding: 40px; color: #888; }

    .keyboard-hint { font-size: 0.75rem; color: #666; text-align: center; margin-top: 2px; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .pulse { animation: pulse 1.5s infinite; }

    @keyframes speaking-dot { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    .speaking-dots span {
      display: inline-block; width: 6px; height: 6px; margin: 0 2px;
      background: #4ecca3; border-radius: 50%;
      animation: speaking-dot 1.4s infinite ease-in-out both;
    }
    .speaking-dots span:nth-child(1) { animation-delay: -0.32s; }
    .speaking-dots span:nth-child(2) { animation-delay: -0.16s; }

    /* ---- MOBILE ---- */
    @media (max-width: 600px) {
      header {
        padding: 8px 12px;
        gap: 8px;
      }

      header h1 { font-size: 1rem; width: 100%; }

      .toolbar-group { flex-wrap: wrap; width: 100%; }

      #char-selector button { padding: 4px 10px; font-size: 0.78rem; }

      #char-other-select, #scene-select {
        max-width: 100%;
        width: 100%;
        font-size: 0.82rem;
      }

      .spacer { display: none; }

      #scene-indicator { width: 100%; text-align: right; font-size: 0.78rem; }

      .main-container { padding: 8px; }

      #history {
        min-height: 200px;
        max-height: calc(100vh - 380px);
        padding: 10px;
      }

      .dialogue-text, .dialogue-hidden { font-size: 0.95rem; }
      .character-name { font-size: 0.78rem; }

      #controls { padding: 10px; gap: 8px; }

      .btn-row { flex-wrap: wrap; }
      .btn-row button { padding: 8px 14px; font-size: 0.85rem; }
      #btn-start, #btn-done { min-width: 100%; }

      #speed-control {
        flex-wrap: wrap;
        gap: 6px;
        font-size: 0.78rem;
      }

      #speed-control input { width: 80px; }

      #speed-control label { white-space: nowrap; }

      .keyboard-hint { font-size: 0.68rem; }
    }
  </style>
</head>

      <button data-char="leo">Leo</button>

    </div>

    <div class="toolbar-group">
      <span class="toolbar-label">Scene:</span>

    </div>

    <div class="spacer"></div>
    <div id="scene-indicator">Ready</div>
  </header>

  <div class="main-container">

    </div>

    <div id="controls">
      <div id="status-bar">

        <div class="speaking-dots" style="display:none"><span></span><span></span><span></span></div>
      </div>
      <div class="btn-row">
        <button id="btn-start">Start Scene</button>
        <button id="btn-done">Done - Continue (Space)</button>
        <button id="btn-stop" disabled>Stop</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-skip">Skip</button>
      </div>
      <div id="speed-control">
        <label>Speed:</label>
        <input type="range" id="speed" min="0.5" max="1.5" step="0.1" value="1.0">
        <span id="speed-val">1.0x</span>
        <label style="margin-left:16px">Pause (s):</label>
        <input type="range" id="pause-dur" min="0.3" max="3.0" step="0.1" value="1.0">
        <span id="pause-val">1.0s</span>
      </div>
      <div class="keyboard-hint">Space = Done / Continue | P = Pause | S = Skip | Esc = Stop</div>
    </div>
  </div>

Scene 13: ‘Epilogue’
Characters: Mia, Andy, Mia, Leo, Sam, 2 new RCs


Location:[md] The same space we opened the show with — but clearly off air. The cameras are gone. The         desk is cluttered with posters, Spangler lunchboxes, half-drunk iced coffees, etc. Our four leads lounge comfortably around the desk and chairs.


Andy
So… how were everyone’s summers? Haven’t seen you all since the Idol insanity at the end of RC.


Sam
I needed a break. From the people. Mostly the people.


Leo
Can you believe Sam didn’t socialize with anyone all summer…
except me?


Mia(grabbing Sam’s hand)
Leo, a summer with you is plenty of socialization for anyone. (They all laugh)


Andy
I’m just happy you’re all back. The new RCs are coming in today, and I could use the extra help onboarding 900 new overachievers.


Two new RCs roll in wide-eyed and our 4 leads watch.


RC 1 (beaming, slightly too loud)[me]
I did it. The most original path imaginable — Harvard Business School.I committed.


RC 2 (already scanning the room looking for others to talk to)
Isn’t it wonderful?I have a feeling I’m going to be excellent at having opinions about other people’s businesses.-
(They high-five. Protagonists groan.)
RC 1 - Young Reza
I’m excited — but there’s no way I’m spending more than two years here.Who would ever do that?


RC 2 - Young Kevin 
Usually, I’d say if you want a friend, get a dog. But I think you might just be the exception. 


They walk away, checking their reflections on their phones on the way out.


Mia
Andy… are we secretly still on TV? Because those two were absolutely smiling for the cameras.


The Dean walks in and stands next to them.


Dean Datar[mf]
Actually, HBS students were performing for each other long before we sold to the Network. The only difference was…we finally put cameras on you.


Leo
El Deano! I thought the ETAs fired you when we bought back the school?


 Dean Datar
Andy — that big, soft-hearted lug — let me keep my job,
as long as I promised to never sell the school again. Thank you, Andy.


Andy
No problem. I never get rid of good talent — even if they’re a little whimsical.


Dean Datar (sitting with them)
So… now that you have freedom in your schedules, how do you plan to spend EC year? Any interesting classes?


Mia
I ranked Crafting Your Life number one. I figured structured reflection with strangers was the best way to find myself. Who knows? Maybe I’ll end up teaching it one day and helping other students too…once I finish processing my feelings into a framework. 


Leo
I’m chilling and traveling since I’m heading back to BCG. But they’re letting me transfer to a U.S. office! Wanted to be closer to this one (nudges Sam).


Sam
Sure, Leo. Definitely about me and not the visa.


Leo
Love and immigration — two systems built on paperwork.


Dean Datar
And what about you, Samantha?


Sam
I’m working up the courage to found something again. This time… no matter what happens, I know I’ll still have my friends around me (she looks around and smiles).


Andy
My schedule is sooo packed - I’m taking all of the classes.


Dean
Look at you, taking full advantage of our world famous curriculum!


Andy
I have to! You were right Dean Datar - HBS is not profitable. Why didn’t I buy an HVAC company?! Margins are incredible.


Dean Datar
And miss out on this beautiful place? You’re exactly where you’re supposed to be. Before we part, Andy… one small favor. Can I sign off the show one last time from my desk? For old time’s sake?


Andy
Of course. But are you sure you want to?
This doesn’t feel like the end of the show (smiles). Feels like just the beginning.


Leo
If there’s one thing I learned from Sam this summer…
it’s that you never want to finish too quickly.


Sam & Mia
Shut up. Leo.


Lights out

// Default voice settings for unknown characters
const DEFAULT_VOICE = { pitch: 1.0, rate: 1.0, voicePref: 'male' };

function parseScript(text) {
  // Cut off the stage direction notes at the end of the script
  const cutoffIdx = text.indexOf('[a]Tech full run script');
  if (cutoffIdx !== -1) text = text.substring(0, cutoffIdx);

  // Remove all bracket tags like [a], [ab], [abc] etc. from the entire text
  text = text.replace(/\[[a-z]{1,3}\]/g, '');

  const lines = text.split('\n');
  const entries = [];
  let currentAct = 1;
  let currentScene = '';

  // Known character names (including partial matches)
  const knownCharacters = new Set(Object.keys(CHARACTER_VOICES));
  // Add base names for detection
  const baseNames = [
    'andy', 'mia', 'sam', 'samantha', 'leo', 'dean datar', 'dean',
    'steve harvey', 'steve', 'ranjay gulati', 'ranjay', 'ranjit',
    'nick lachey', 'nick', 'vanessa lachey', 'vanessa',
    'kevin', 'reza', 'glenn', 'simon cowell', 'simon',
    'exec 1', 'exec 2', 'exec 3', 'exec #1', 'exec #2', 'exec #3',
    'exec intern', 'hbs intern', 'network executive #1', 'network executive #2',
    'mary metrix', 'mary', 'nicole nevers', 'nicole',
    'lucas laier', 'lucas', 'denise', 'fred x', 'fred', 'frederik',
    'section xer 1', 'generic xer 2', 'generic xer 3',
    'delilah', 'lydia', 'annie', 'stagehand', 'tribe x',
    'pam', 'jim', 'steve bannon', 'bannon',
    'eta #1', 'eta #2', 'eta #3', 'eta #4',
    'all 4 etas', 'the etas',
    'matt weinzierl', 'matt', 'kristen fitzpatrick', 'kristen',
    'rc 1', 'rc 2', 'rc 1 - young reza', 'rc 2 - young kevin',
    'random guy / scribe', 'scribe',
    'mia/leo/sam', 'sam & mia', 'mia and andy', 'leo & sam',
    'all execs', 'team',
    "andy's voice", "andy(masked voice)", "andy(taking mask off",
    'exec intern (jennifer)', 'jennifer',
    'exec 1 (in the middle, the boss)',
    'exec 2 (handsy and emotionally oriented)',
    'exec 3 (ruthless capitalist)',
  ];

  // Character line pattern: starts with a character name, optionally with parenthetical/colon
  // e.g., "Andy", "Andy (salutes)", "Leo:", "Dean Datar", "Exec #1 (in the middle)"
  const charLineRegex = /^([A-Z][A-Za-z\s\/&#;.\-\d']+?)(?:\s*\([^)]*\))?\s*[\:\[]?\s*$/;

  let i = 0;
  while (i < lines.length) {
    const line = lines[i].trim();

    // Skip empty lines
    if (!line) { i++; continue; }

    // Detect act boundaries
    if (/^Act\s+2/i.test(line)) {
      currentAct = 2;
      i++;
      continue;
    }

    // Skip the title/version lines
    if (/^The HB\(TV\) Show/i.test(line) || /^Version:/i.test(line)) {
      i++;
      continue;
    }

    // Detect scene headers
    const sceneMatch = line.match(/^Scene\s+(\d+)\s*:\s*'?(.+?)'?\s*$/);
    if (sceneMatch) {
      currentScene = `Scene ${sceneMatch[1]}: ${sceneMatch[2]}`;
      entries.push({ type: 'scene', act: currentAct, scene: currentScene, text: currentScene });
      i++;
      continue;
    }

    // Detect horizontal rules (scene breaks)
    if (/^_{5,}$/.test(line)) {
      i++;
      continue;
    }

    // Detect songs
    const songMatch = line.match(/^\[Song:\s*(.+)\]$/);
    if (songMatch) {
      entries.push({ type: 'song', act: currentAct, scene: currentScene, text: songMatch[1] });
      i++;
      continue;
    }

    // Skip pure comment lines [a], [b] etc
    if (/^\[[a-z]{1,3}\]$/.test(line)) { i++; continue; }

    // Skip lines that are just comments
    if (/^@/.test(line)) { i++; continue; }

    // Skip "Characters:" and "Location:" lines
    if (/^Characters:/i.test(line) || /^Location:/i.test(line)) {
      i++;
      continue;
    }

    // Try to match a character name line
    let charName = tryMatchCharacter(line);

    if (charName) {
      // Collect dialogue lines until next character or empty line gap
      let dialogue = '';

      // Check if there's inline dialogue on the same line as the character name
      const inlineMatch = line.match(new RegExp('^' + escapeRegex(charName) + '(?:\\s*\\([^)]*\\))?\\s*[:\\-]?\\s*$', 'i'));
      if (!inlineMatch) {
        // There might be dialogue on the same line after the name
        const afterName = extractDialogueFromCharLine(line, charName);
        if (afterName) dialogue = afterName;
      }

      i++;

      // Collect continuation lines
      while (i < lines.length) {
        const nextLine = lines[i].trim();
        if (!nextLine) { i++; break; }

        // If next line is a new character, scene, song, or structural element, stop
        if (tryMatchCharacter(nextLine)) break;
        if (/^Scene\s+\d+/i.test(nextLine)) break;
        if (/^\[Song:/i.test(nextLine)) break;
        if (/^_{5,}$/.test(nextLine)) break;
        if (/^Act\s+\d/i.test(nextLine)) break;
        if (/^Characters:/i.test(nextLine)) break;
        if (/^Location:/i.test(nextLine)) break;

        // Skip pure brackets/comments
        const cleaned = nextLine.replace(/\[[a-z]{1,3}\]/g, '').trim();
        if (!cleaned) { i++; continue; }

        // Check if it's a stage direction (pure description, no dialogue)
        if (isStageDirection(cleaned) && !dialogue) {
          i++;
          continue;
        }

        // It's dialogue continuation
        if (dialogue) dialogue += ' ';
        dialogue += cleaned;
        i++;
      }

      // Clean up dialogue
      dialogue = cleanDialogue(dialogue);

      if (dialogue) {
        const normalizedName = normalizeCharName(charName);
        entries.push({
          type: 'line',
          act: currentAct,
          scene: currentScene,
          character: normalizedName,
          dialogue: dialogue
        });
      }
    } else {
      // Not a character line - skip (stage direction, etc.)
      i++;
    }
  }

  return entries;
}

function tryMatchCharacter(line) {
  // Remove trailing bracket comments like [ab], [cd]
  const cleaned = line.replace(/\[[a-z]{1,3}\]/g, '').trim();

  // Common patterns for character lines:
  // "CharName" (alone on line)
  // "CharName (stage direction)"
  // "CharName (stage direction):"
  // "CharName:"
  // "CharName-"
  // "CharName (parenthetical) text on same line"

  // Try exact known character match first
  const patterns = [
    // "Name:" or "Name-" or "Name" at start, possibly with parenthetical
    /^([\w\s\/&#;.\-\d']+?)(?:\s*\([^)]*\))?\s*[:;\-]?\s*$/i,
    // Character name with inline dialogue
    /^([\w\s\/&#;.\-\d']+?)(?:\s*\([^)]*\))\s*$/i,
    // Name with colon and dialogue on same line
    /^([\w\s\/&#;.\-\d']+?)\s*(?:\([^)]*\))?\s*[:]\s*.+$/i,
  ];

  for (const pattern of patterns) {
    const m = cleaned.match(pattern);
    if (m) {
      const candidate = m[1].trim();
      if (isKnownCharacter(candidate)) {
        return candidate;
      }
    }
  }

  return null;
}

function isKnownCharacter(name) {
  const lower = name.toLowerCase().trim();

  // Direct match
  if (CHARACTER_VOICES[lower]) return true;

  // Check common variations
  const variations = [
    lower,
    lower.replace(/\s+/g, ' '),
    lower.replace(/[#]/g, '#'),
  ];

  for (const v of variations) {
    if (CHARACTER_VOICES[v]) return true;
  }

  // Partial matches for characters with parenthetical descriptions
  const partialMatches = [
    'exec 1', 'exec 2', 'exec 3', 'exec #1', 'exec #2', 'exec #3',
    'exec intern', 'hbs intern', 'eta #1', 'eta #2', 'eta #3', 'eta #4',
    'andy', 'mia', 'sam', 'samantha', 'leo', 'dean datar', 'dean',
    'nick', 'vanessa', 'kevin', 'reza', 'ranjay', 'ranjit',
    'steve harvey', 'steve bannon', 'bannon', 'simon', 'glenn',
    'fred', 'frederik', 'delilah', 'lydia', 'annie',
    'denise', 'mary', 'nicole', 'lucas', 'pam', 'jim',
    'stagehand', 'tribe x', 'all 4 etas', 'the etas',
    'matt', 'kristen', 'scribe', 'random guy',
    'rc 1', 'rc 2', 'team', 'all execs',
    'mia/leo/sam', 'sam & mia', 'mia and andy', 'leo & sam',
    'section xer', 'generic xer',
  ];

  for (const pm of partialMatches) {
    if (lower.startsWith(pm)) return true;
  }

  return false;
}

function normalizeCharName(name) {
  let n = name.trim();
  // Remove trailing colons, dashes
  n = n.replace(/[\:\-]+$/, '').trim();
  return n;
}

// Which character the user is playing
let myCharacter = 'andy';

// Normalized name -> matching function for each character
function isMyLine(charName) {
  const lower = charName.toLowerCase();
  const mc = myCharacter.toLowerCase();

  // Main four have special matching
  switch (mc) {
    case 'andy':
      return lower.startsWith('andy') || lower === "andy's voice" || (lower.includes('andy') && !lower.includes('candy'));
    case 'mia':
      return lower.startsWith('mia') || (lower.includes('mia') && !lower.includes('miami'));
    case 'sam': case 'samantha':
      return lower.startsWith('sam') || lower.startsWith('samantha');
    case 'leo':
      return lower.startsWith('leo') || lower.startsWith('leonardo');
  }

  // For any other character, match by prefix
  return lower.startsWith(mc) || lower === mc;
}

function extractDialogueFromCharLine(line, charName) {
  // Try to extract dialogue that appears on the same line as the character name
  // e.g., "Leo: I love travel" -> "I love travel"
  const escaped = escapeRegex(charName);
  const patterns = [
    new RegExp('^' + escaped + '(?:\\s*\\([^)]*\\))?\\s*[:\\-]\\s*(.+)$', 'i'),
  ];
  for (const p of patterns) {
    const m = line.match(p);
    if (m && m[1]) return m[1].trim();
  }
  return null;
}

function isStageDirection(line) {
  // Heuristic: stage directions tend to describe actions, not be dialogue
  // They often start with character actions described in third person
  const directionPatterns = [
    /^(?:The |A |An |Our |Two |They |He |She |Music |Sound |Timer |Applause|Enter |Exit |Lights |Spotlight)/i,
    /^(?:.*walks |.*enters |.*exits |.*runs |.*moves |.*stands |.*sits |.*gestures)/i,
    /^(?:.*starts |.*begins |.*reveals |.*appears |.*disappears)/i,
    /^(?:.*leaves |.*scurries |.*storms |.*bursts )/i,
    /^(?:Scoreboard |Loud incorrect|The board |The cameras |The lights |DJ |A pipe )/i,
    /^(?:Beat for |ALARM|Blackout|Lights dim|Lights out)/i,
    /screams?\s/i,
    /^\-/,
  ];

  for (const p of directionPatterns) {
    if (p.test(line)) return true;
  }
  return false;
}

function cleanDialogue(text) {
  if (!text) return '';
  // Remove bracket comments [a], [ab], [abc]
  text = text.replace(/\[[a-z]{1,3}\]/g, '');
  // Remove @tech, @prop notes
  text = text.replace(/@\w+[^.]*$/g, '');
  // Clean up extra whitespace
  text = text.replace(/\s+/g, ' ').trim();
  // Remove leading/trailing punctuation artifacts
  text = text.replace(/^\s*[-:]\s*/, '');
  return text;
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}


// ==================== TTS ENGINE ====================

let voices = [];
let voiceMap = {}; // voicePref -> SpeechSynthesisVoice

function loadVoices() {
  return new Promise((resolve) => {
    voices = speechSynthesis.getVoices();
    if (voices.length > 0) {
      assignVoices();
      resolve();
      return;
    }
    speechSynthesis.onvoiceschanged = () => {
      voices = speechSynthesis.getVoices();
      assignVoices();
      resolve();
    };
    // Fallback timeout
    setTimeout(() => {
      voices = speechSynthesis.getVoices();
      assignVoices();
      resolve();
    }, 2000);
  });
}

function assignVoices() {
  // Try to find diverse English voices
  const english = voices.filter(v => v.lang.startsWith('en'));
  const females = english.filter(v =>
    /female|samantha|victoria|karen|moira|fiona|kate|susan|zira|hazel|tessa/i.test(v.name)
  );
  const males = english.filter(v =>
    /\b(male|daniel|alex|tom|james|david|fred|ralph|aaron|oliver)\b/i.test(v.name) &&
    !/female/i.test(v.name)
  );

  // Use whatever we can find
  const allUsable = english.length > 0 ? english : voices;

  voiceMap = {
    'male': males[0] || allUsable[0],
    'male2': males[1] || allUsable[1] || allUsable[0],
    'male3': males[2] || allUsable[2] || allUsable[0],
    'female': females[0] || allUsable[Math.min(3, allUsable.length - 1)],
    'female2': females[1] || allUsable[Math.min(4, allUsable.length - 1)],
  };
}

function getVoiceForCharacter(charName) {
  const lower = charName.toLowerCase();

  // Try exact match
  if (CHARACTER_VOICES[lower]) return CHARACTER_VOICES[lower];

  // Try partial matches
  for (const [key, val] of Object.entries(CHARACTER_VOICES)) {
    if (lower.startsWith(key) || lower.includes(key)) return val;
  }

  return DEFAULT_VOICE;
}

function speak(text, charName) {
  // Split long text into sentences to avoid the Chrome/Safari TTS bug
  // where long utterances get silently cancelled after ~15 seconds
  const chunks = splitIntoChunks(text);
  const voiceConfig = getVoiceForCharacter(charName);
  const speedMultiplier = parseFloat(document.getElementById('speed').value);

  return chunks.reduce((chain, chunk) => {
    return chain.then(() => speakChunk(chunk, voiceConfig, speedMultiplier));
  }, Promise.resolve());
}

function splitIntoChunks(text) {
  // Split on sentence boundaries, keeping chunks under ~150 chars
  const sentences = text.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [text];
  const chunks = [];
  let current = '';

  for (const sentence of sentences) {
    if (current.length + sentence.length > 150 && current.length > 0) {
      chunks.push(current.trim());
      current = sentence;
    } else {
      current += sentence;
    }
  }
  if (current.trim()) chunks.push(current.trim());
  return chunks.length > 0 ? chunks : [text];
}

function speakChunk(text, voiceConfig, speedMultiplier) {
  return new Promise((resolve) => {
    const utter = new SpeechSynthesisUtterance(text);

    utter.voice = voiceMap[voiceConfig.voicePref] || voiceMap['male'] || voices[0];
    utter.pitch = voiceConfig.pitch;
    utter.rate = voiceConfig.rate * speedMultiplier;
    utter.volume = 1.0;

    let resolved = false;
    const done = () => { if (!resolved) { resolved = true; resolve(); } };

    utter.onend = done;
    utter.onerror = (e) => { console.warn('TTS error', e); done(); };

    // Safety timeout: ~200ms per word + 3 seconds buffer
    const wordCount = text.split(/\s+/).length;
    const timeoutMs = Math.max(5000, (wordCount * 400 / speedMultiplier) + 3000);
    setTimeout(done, timeoutMs);

    // Chrome keepalive: pause/resume periodically to prevent silent cancel
    let keepAlive = setInterval(() => {
      if (speechSynthesis.speaking && !speechSynthesis.paused) {
        speechSynthesis.pause();
        speechSynthesis.resume();
      }
    }, 10000);

    const origDone = done;
    utter.onend = () => { clearInterval(keepAlive); origDone(); };
    utter.onerror = (e) => { clearInterval(keepAlive); console.warn('TTS error', e); origDone(); };

    speechSynthesis.speak(utter);
  });
}

// Get all unique scenes from the parsed entries
function getScenes() {
  return allEntries.filter(e => e.type === 'scene');
}

// Get the index in allEntries where a given scene starts
function getSceneStartIndex(sceneText) {
  return allEntries.findIndex(e => e.type === 'scene' && e.text === sceneText);
}

// Get all unique non-lead character names for the "Other" dropdown
function getOtherCharacters() {
  const leads = new Set(['andy', 'mia', 'sam', 'samantha', 'leo']);
  const others = new Map(); // lowercase key -> display name

  allEntries.forEach(e => {
    if (e.type !== 'line') return;
    const lower = e.character.toLowerCase();
    // Skip leads
    if (leads.has(lower) || lower.startsWith('andy') || lower.startsWith('mia')
        || lower.startsWith('sam') || lower.startsWith('leo')) return;
    // Skip multi-character lines
    if (lower.includes('/') || lower.includes('&')) return;
    // Normalize: take the base name (before parenthetical)
    const base = e.character.replace(/\s*\(.*\)/, '').trim();
    const baseKey = base.toLowerCase();
    if (!others.has(baseKey)) {
      others.set(baseKey, base);
    }
  });

  // Sort alphabetically
  return Array.from(others.entries()).sort((a, b) => a[1].localeCompare(b[1]));
}

function populateSceneDropdown() {
  sceneSelect.innerHTML = '';
  const scenes = getScenes();
  scenes.forEach((s, i) => {
    const opt = document.createElement('option');
    opt.value = s.text;
    opt.textContent = `Act ${s.act} - ${s.text}`;
    if (i === 0) opt.selected = true;
    sceneSelect.appendChild(opt);
  });
}

function populateOtherCharDropdown() {
  charOtherSelect.innerHTML = '<option value="">Other...</option>';
  getOtherCharacters().forEach(([key, display]) => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = display;
    charOtherSelect.appendChild(opt);
  });
}

// Filter entries from the selected scene to the next scene (or end)
function getEntriesForScene(sceneText) {
  const startIdx = getSceneStartIndex(sceneText);
  if (startIdx === -1) return allEntries;

  // Find next scene
  let endIdx = allEntries.length;
  for (let i = startIdx + 1; i < allEntries.length; i++) {
    if (allEntries[i].type === 'scene') { endIdx = i; break; }
  }
  return allEntries.slice(startIdx, endIdx);
}

function renderEntry(entry, state = 'upcoming') {
  const div = document.createElement('div');

  if (entry.type === 'scene') {
    div.className = 'scene-header';
    div.textContent = entry.text;
    return div;
  }

  if (entry.type === 'song') {
    div.className = 'song-marker';
    div.textContent = `[Song: ${entry.text}]`;
    return div;
  }

  const isMine = isMyLine(entry.character);
  div.className = `line-entry ${state}${isMine ? ' my-line' : ''}`;

  if (isMine) {
    // My lines are HIDDEN by default (for memorization)
    const id = 'line-' + Math.random().toString(36).substr(2, 9);
    div.innerHTML = `
      <div class="character-name" style="color:${getCharColor(entry.character)}">${entry.character}</div>
      <div class="dialogue-hidden" id="${id}" onclick="revealLine(this, '${escapeForAttr(entry.dialogue)}')">[Your line - click to reveal]<button class="btn-reveal" onclick="event.stopPropagation(); revealLine(document.getElementById('${id}'), '${escapeForAttr(entry.dialogue)}')">Show</button></div>
    `;
  } else {
    div.innerHTML = `
      <div class="character-name" style="color:${getCharColor(entry.character)}">${entry.character}</div>
      <div class="dialogue-text">${entry.dialogue}</div>
    `;
  }
  return div;
}

function escapeForAttr(str) {
  return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// Called when user clicks to reveal a hidden line
window.revealLine = function(el, text) {
  el.className = 'dialogue-text';
  el.textContent = text;
  el.style.cursor = 'default';
  el.onclick = null;
};

function getCharColor(name) {
  const lower = name.toLowerCase();
  if (lower.startsWith('andy') || lower.includes('andy')) return '#ffd700';
  if (lower.startsWith('mia') || lower.includes('mia')) return '#ff6b9d';
  if (lower.startsWith('sam') || lower === 'samantha') return '#4ecca3';
  if (lower.startsWith('leo')) return '#45b7d1';
  if (lower.includes('dean')) return '#ff8c42';
  if (lower.includes('exec') || lower.includes('intern')) return '#ff4757';
  if (lower.includes('eta')) return '#c8b6ff';
  return '#a8a8b8';
}

function scrollToBottom() {
  historyEl.scrollTop = historyEl.scrollHeight;
}

function updateDisplay() {
  historyEl.innerHTML = '';

  const windowStart = Math.max(0, currentIndex - 8);
  const windowEnd = Math.min(filteredEntries.length, currentIndex + 4);

  for (let i = windowStart; i < windowEnd; i++) {
    const entry = filteredEntries[i];
    let state = 'upcoming';
    if (i < currentIndex) state = 'spoken';
    if (i === currentIndex) state = 'current';
    const el = renderEntry(entry, state);
    historyEl.appendChild(el);
  }

  scrollToBottom();

  const currentEntry = filteredEntries[currentIndex];
  if (currentEntry) {
    sceneIndicator.textContent = `Act ${currentEntry.act} | ${currentEntry.scene || 'Intro'}`;
  }
}

function setStatus(text, className = '') {
  statusText.textContent = text;
  statusText.className = className;
}

function showSpeakingDots(show) {
  speakingDots.style.display = show ? 'inline-flex' : 'none';
}

// ==================== PLAYBACK ENGINE ====================

async function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function stopPlayback() {
  speechSynthesis.cancel();
  isRunning = false;
  isPaused = false;
  waitingForUser = false;
  signalDone();
  btnDone.style.display = 'none';
  btnStart.style.display = 'flex';
  btnStart.textContent = 'Resume';
  btnStop.disabled = true;
  btnPause.textContent = 'Pause';
  showSpeakingDots(false);
  setStatus('Stopped. Press Resume to continue, or pick a new scene.');
  updateDisplay();
}

function resetToScene() {
  stopPlayback();
  const sceneText = sceneSelect.value;
  filteredEntries = getEntriesForScene(sceneText);
  currentIndex = 0;
  btnStart.textContent = 'Start Scene';
  const charName = myCharacter.charAt(0).toUpperCase() + myCharacter.slice(1);
  const myCount = filteredEntries.filter(e => e.type === 'line' && isMyLine(e.character)).length;
  setStatus(`${sceneText} | ${myCount} ${charName} lines. Press Start.`);
  updateDisplay();
}

async function runScene() {
  isRunning = true;
  btnStart.style.display = 'none';
  btnStop.disabled = false;

  while (currentIndex < filteredEntries.length && isRunning) {
    if (isPaused) {
      await sleep(100);
      continue;
    }

    const entry = filteredEntries[currentIndex];
    updateDisplay();

    if (entry.type === 'scene') {
      setStatus(`--- ${entry.text} ---`);
      await sleep(1500);
      if (!isRunning) break;
      currentIndex++;
      continue;
    }

    if (entry.type === 'song') {
      setStatus(`[Song: ${entry.text}] - Press Space to continue`, '');
      waitingForUser = true;
      btnDone.style.display = 'flex';
      btnDone.textContent = 'Continue Past Song (Space)';
      await waitForSignal();
      if (!isRunning) break;
      btnDone.style.display = 'none';
      waitingForUser = false;
      currentIndex++;
      continue;
    }

    if (isMyLine(entry.character)) {
      setStatus(`YOUR LINE - read it aloud, then press Space`, 'your-line pulse');
      btnDone.style.display = 'flex';
      btnDone.textContent = 'Done - Continue (Space)';
      waitingForUser = true;

      await waitForSignal();
      if (!isRunning) break;

      waitingForUser = false;
      btnDone.style.display = 'none';
      currentIndex++;

      const pauseDur = parseFloat(document.getElementById('pause-dur').value) * 1000;
      await sleep(pauseDur);
    } else {
      setStatus(`${entry.character} speaking...`, 'speaking');
      showSpeakingDots(true);

      await speak(entry.dialogue, entry.character);
      if (!isRunning) break;

      showSpeakingDots(false);
      currentIndex++;

      const pauseDur = parseFloat(document.getElementById('pause-dur').value) * 1000;
      await sleep(pauseDur);
    }
  }

  if (isRunning && currentIndex >= filteredEntries.length) {
    setStatus('End of scene! Great job.', '');
    updateDisplay();
  }

  isRunning = false;
  btnStart.style.display = 'flex';
  btnStart.textContent = 'Restart Scene';
  btnStop.disabled = true;
  showSpeakingDots(false);
}

function waitForSignal() {
  return new Promise((resolve) => {
    window._resolveSignal = resolve;
  });
}

function signalDone() {
  if (window._resolveSignal) {
    const resolve = window._resolveSignal;
    window._resolveSignal = null;
    resolve();
  }
}

// ==================== EVENT HANDLERS ====================

btnStart.addEventListener('click', () => {
  if (btnStart.textContent === 'Restart Scene') {
    currentIndex = 0;
  }
  runScene();
});

btnDone.addEventListener('click', () => signalDone());

btnPause.addEventListener('click', () => {
  if (isPaused) {
    isPaused = false;
    btnPause.textContent = 'Pause';
    speechSynthesis.resume();
  } else {
    isPaused = true;
    btnPause.textContent = 'Resume';
    speechSynthesis.pause();
  }
});

btnSkip.addEventListener('click', () => {
  speechSynthesis.cancel();
  if (waitingForUser) signalDone();
});

btnStop.addEventListener('click', () => stopPlayback());

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (waitingForUser) {
      signalDone();
    } else if (!isRunning) {
      if (btnStart.textContent === 'Restart Scene') currentIndex = 0;
      runScene();
    }
  }
  if (e.code === 'KeyP') btnPause.click();
  if (e.code === 'KeyS' && !e.metaKey && !e.ctrlKey) btnSkip.click();
  if (e.code === 'Escape') {
    if (isRunning) stopPlayback();
    else resetToScene();
  }
});

// Scene selector
sceneSelect.addEventListener('change', () => resetToScene());

// Character selector - lead buttons
document.querySelectorAll('#char-selector button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#char-selector button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    charOtherSelect.classList.remove('active');
    charOtherSelect.value = '';
    myCharacter = btn.dataset.char;
    resetToScene();
  });
});

// Character selector - other dropdown
charOtherSelect.addEventListener('change', () => {
  if (!charOtherSelect.value) return;
  document.querySelectorAll('#char-selector button').forEach(b => b.classList.remove('active'));
  charOtherSelect.classList.add('active');
  myCharacter = charOtherSelect.value;
  resetToScene();
});

// Speed display
document.getElementById('speed').addEventListener('input', (e) => {
  document.getElementById('speed-val').textContent = e.target.value + 'x';
});
document.getElementById('pause-dur').addEventListener('input', (e) => {
  document.getElementById('pause-val').textContent = e.target.value + 's';
});


// ==================== INIT ====================

async function init() {
  await loadVoices();

  allEntries = parseScript(SCRIPT_TEXT);

  populateSceneDropdown();
  populateOtherCharDropdown();

  // Default: first scene
  const firstScene = getScenes()[0];
  if (firstScene) {
    sceneSelect.value = firstScene.text;
    filteredEntries = getEntriesForScene(firstScene.text);
  } else {
    filteredEntries = allEntries;
  }
  currentIndex = 0;

  const lineCount = allEntries.filter(e => e.type === 'line').length;
  const myCount = filteredEntries.filter(e => e.type === 'line' && isMyLine(e.character)).length;
  const charName = myCharacter.charAt(0).toUpperCase() + myCharacter.slice(1);

  document.getElementById('voice-loading').innerHTML =
    `<strong>Ready!</strong><br>` +
    `${lineCount} total lines | Playing as <strong>${charName}</strong><br>` +
    `Select a scene and press <strong>Start</strong> or <strong>Space</strong>.`;

  setStatus(`Pick a scene and press Start. Playing as ${charName}.`);
}

init();
</script>
